<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script defer src="alpine.js"></script>
	<title>Emojis</title>
	<script lang="js">
		function getEmojis() {
			return {
				emojis: [],
				async fetchEmojis() {
					const response = await fetch('/api/emojis');
					const resp = await response.json();
					this.emojis = resp.emojis;
				}
			}
		}
		function formatTime(d) {
			const date = new Date(d);
			return date.toLocaleString();
		}
		function formatLabel(label) {
			if (label && label !== "") {
				return label;
			}
			return "未标注";
		}
	</script>
	<style>
		* {
			font-family: "system-ui";
		}
		.img {
			height: 7rem;
			border-radius: 0.7rem;
			max-width: 100%;
			@media screen and (max-width: 480px) {
				height: unset;
				max-height: 7rem;
			}
		}
		li {
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 0.25rem;
			border: 1px rgba(0,0,0,0.05) solid;
			border-radius: 0.7rem;
			justify-content: center;
		}
		li:hover {
			background-color: rgba(0,0,0,0.1);
		}
		.li-container {
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
			gap: 1rem;
			@media screen and (max-width: 480px) {
				justify-content: center;
				gap: 0.5rem;
			}
		}
		#emoji_id {
			font-size: 0.5rem;
			margin-top: 0.25rem;
			color: rgba(0,0,0,0.5);
			font-family: sans-serif;
		}
		#emoji_label {
			margin-top: 0.5rem;
			font-size: 1rem;
		}
		#emoji_time {
			font-size: 0.75rem;
			margin-top: 0.25rem;
			color: rgba(0,0,0,0.5);
			font-family: sans-serif;
		}
		p {
			margin: 0;
		}
		body {
			margin: 1.5rem;
			@media screen and (max-width: 480px) {
				margin: .5rem;
			}
		}
		.unlabeled {
			color: rgba(0,0,0,0.5);
		}
		.h1 {
			font-size: 2rem;
			font-weight: bold;
		}
		.hint {
			font-size: 0.75rem;
			color: rgba(0,0,0,0.5);
		}
	</style>
</head>
<body x-data="getEmojis" x-init="await fetchEmojis()">
<span class="h1">Emojis</span>
<span class="hint">共 <span x-text="emojis.length"></span> 张表情
</span>
<div class="li-container">
	<template x-for="emoji in emojis">
		<li>
			<img class="img" :src="'api/emoji/'+emoji.id" :alt="emoji.label"/>
			<p id="emoji_label" :class="{unlabeled: !emoji.label || emoji.label === ''}" x-text="formatLabel(emoji.label)"></p>
			<p id="emoji_id" x-text="emoji.id"></p>
			<p id="emoji_time" x-text="formatTime(emoji.CreatedAt)"></p>
		</li>
	</template>
</div>
</body>
</html>
